worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Proxy upstream services (resolved via Kubernetes DNS)
  upstream payments_api { server payments-api:8082; }
  upstream auth_api     { server auth-api:8081; }

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Proxy to payments-api
    location /api/payments/ {
      rewrite ^/api/payments/(.*)$ /$1 break;
      proxy_pass         http://payments_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # Proxy to auth-api
    location /api/auth/ {
      rewrite ^/api/auth/(.*)$ /auth/$1 break;
      proxy_pass         http://auth_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # Health check for the frontend itself
    location /health {
      return 200 '{"status":"healthy","service":"frontend"}';
      add_header Content-Type application/json;
    }
  }
}
