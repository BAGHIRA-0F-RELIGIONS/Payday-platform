# Helm values for grafana/loki chart — single-binary mode on EKS
#
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm repo update
#   helm upgrade --install loki grafana/loki \
#     --namespace monitoring --create-namespace \
#     --values k8s/observability/loki-values.yaml
#
# Then install Promtail (log collector):
#   helm upgrade --install promtail grafana/promtail \
#     --namespace monitoring \
#     --set config.clients[0].url=http://loki:3100/loki/api/v1/push

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    retention_period: 720h      # 30 days
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_series: 10000

  compactor:
    retention_enabled: true
    retention_delete_delay: 2h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: gp2            # AWS EKS EBS storage class
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Disable components not needed for single-binary mode
gateway:
  enabled: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable self-monitoring to keep it simple
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
