# Helm values for kube-prometheus-stack
# Install with:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install prometheus prometheus-community/kube-prometheus-stack \
#     --namespace monitoring --create-namespace \
#     --values k8s/observability/prometheus-values.yaml

# ── Prometheus settings ───────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # How long to keep metrics data
    retention: 30d
    retentionSize: "10GB"

    # Scrape all pods that have the prometheus.io/scrape=true annotation
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false

    # Resource limits for Prometheus itself
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi

    # Storage: persist metrics to disk
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

    # Scrape every 30 seconds
    scrapeInterval: 30s

    # Additional scrape configs to scrape our app pods directly
    additionalScrapeConfigs:
      - job_name: payday-apps
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [staging, production]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

# ── Grafana settings ──────────────────────────────────────────────────────────
grafana:
  enabled: true
  adminPassword: "payday-grafana-admin"   # Change this in production!
  ingress:
    enabled: true
    ingressClassName: nginx
    path: /grafana
    pathType: Prefix
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana"
      serve_from_sub_path: true
  persistence:
    enabled: true
    storageClassName: gp2
    size: 5Gi
  # Auto-load our custom dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: payday
          folder: Payday Platform
          type: file
          options:
            path: /var/lib/grafana/dashboards/payday
  dashboardsConfigMaps:
    payday: payday-grafana-dashboard
  # Pre-wire Loki as a data source so logs appear automatically
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

# ── Alertmanager settings ─────────────────────────────────────────────────────
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, namespace, severity]
      group_wait:      30s
      group_interval:  5m
      repeat_interval: 3h
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: critical-alerts
          continue: true
    receivers:
      - name: default
        # Add Slack webhook here in production:
        # slack_configs:
        #   - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        #     channel: '#payday-alerts'
        #     title: 'Payday Alert'
        #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
      - name: critical-alerts
        # PagerDuty or email for critical alerts:
        # pagerduty_configs:
        #   - service_key: YOUR_PAGERDUTY_KEY

# ── Default alert rules ───────────────────────────────────────────────────────
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
