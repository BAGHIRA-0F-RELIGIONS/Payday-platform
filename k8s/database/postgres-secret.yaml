# IMPORTANT: In a real project, NEVER commit real secrets to Git.
# This file uses placeholder values. The real values are injected via:
#   - GitHub Actions Secrets → kubectl create secret
#   - OR: External Secrets Operator pulling from a vault
#
# To create the real secret manually:
#   kubectl create secret generic postgres-secret \
#     --from-literal=POSTGRES_PASSWORD=<your-strong-password> \
#     --from-literal=DATABASE_URL=postgres://payday:<password>@postgres:5432/payday \
#     -n production --dry-run=client -o yaml | kubectl apply -f -

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: production
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME_IN_PIPELINE"
  DATABASE_URL: "postgres://payday:REPLACE_ME_IN_PIPELINE@postgres:5432/payday?sslmode=disable"
