# NGINX Ingress Controller routes all external traffic to the frontend.
# The frontend's nginx.conf already proxies /api/payments/* and /api/auth/*
# to the correct backend services with the correct path rewrites — exactly
# the same way docker-compose works locally.
#
# Traffic flow:
#   Internet → Ingress → frontend (port 80)
#                          ↳ /api/payments/* → payments-api:8082
#                          ↳ /api/auth/*     → auth-api:8081
#                          ↳ /*              → static HTML
#
# Install NGINX Ingress Controller:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payday-ingress
  namespace: staging
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size:    "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

