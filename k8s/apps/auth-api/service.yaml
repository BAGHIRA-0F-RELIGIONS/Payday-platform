# Service: exposes auth-api to other pods inside the cluster
# Other pods connect using: http://auth-api:8081
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: staging
  labels:
    app: auth-api
spec:
  selector:
    app: auth-api
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP  # Only accessible inside the cluster

